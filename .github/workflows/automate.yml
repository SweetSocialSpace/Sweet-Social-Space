name: Free Automation - No Vercel Cron

on:
  schedule:
    - cron: '0 * * * *'  # every hour, free
  workflow_dispatch:

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - name: Ingest San Jose 311 city data
        run: |
          echo "Calling real ingest route..."
          curl -s "https://sweet-social-space.vercel.app/api/ingest"
          echo ""
          echo "Done - city data should be ingesting now"
